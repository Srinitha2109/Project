<div class="dashboard-layout" [class.collapsed]="isSidebarCollapsed()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="material-icons menu-icon">menu</span>
      </button>
      @if (!isSidebarCollapsed()) {
        <span class="header-text">Agent Console</span>
      }
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/agent/dashboard" routerLinkActive="active" class="nav-item">
        <span class="material-icons icon">dashboard</span>
        @if (!isSidebarCollapsed()) {
          <span class="label">Overview</span>
        }
      </a>
      <a routerLink="/agent/requests" routerLinkActive="active" class="nav-item">
        <span class="material-icons icon">inbox</span>
        @if (!isSidebarCollapsed()) {
          <span class="label">Requests</span>
        }
      </a>

      <div class="logout-wrapper">
        <a class="nav-item logout-item" (click)="logout()">
          <span class="material-icons icon">logout</span>
          @if (!isSidebarCollapsed()) {
            <span class="label">Logout</span>
          }
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-workspace">
    <header class="workspace-header">
      <div class="page-title">
        <h2 class="title-text">Agent Console</h2>
      </div>

      <div class="header-actions">
        <app-notification-bell></app-notification-bell>

        <div class="user-profile">
          <div class="user-info text-right">
            <span class="user-name hidden sm:block" style="font-size:0.85rem;font-weight:700;color:#1e293b;">{{ currentUser()?.fullName }}</span>
          </div>
          <div class="user-avatar w-10 h-10 bg-burgundy text-white rounded-full flex items-center justify-center font-black shadow-inner ring-4 ring-pink/20">
            {{ getInitials(currentUser()?.fullName) }}
          </div>
        </div>
      </div>
    </header>

    <section class="content-area">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<style>
  .dashboard-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: #f8fafc;
}

/* Fixed Sidebar */
.sidebar {
width: 260px;
background: white;
border-right: 1px solid #e2e8f0;
display: flex;
flex-direction: column;
transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
flex-shrink: 0;
}

.collapsed .sidebar {
width: 80px;
}

.sidebar-header {
height: 72px;
display: flex;
align-items: center;
padding: 0 20px;
gap: 15px;
border-bottom: 1px solid #f1f5f9;
}

.toggle-btn {
background: none;
border: none;
color: #7a0019;
font-size: 1.25rem;
cursor: pointer;
padding: 5px;
display: flex;
align-items: center;
border-radius: 6px;
}

.header-text {
font-weight: 800;
color: #7a0019;
font-size: 1.1rem;
letter-spacing: 0.5px;
white-space: nowrap;
}

.sidebar-nav {
flex: 1;
display: flex;
flex-direction: column;
padding: 15px 10px;
gap: 4px;
position: relative;
}

.nav-item {
display: flex;
align-items: center;
padding: 12px 15px;
border-radius: 12px;
color: #64748b;
text-decoration: none;
transition: all 0.2s;
gap: 15px;
}

.nav-item .icon { font-size: 1.2rem; min-width: 24px; text-align: center; }
.nav-item .label { font-weight: 600; font-size: 0.9rem; }

.nav-item:hover { background: #f8fafc; color: #7a0019; }
.nav-item.active { background: #7a0019; color: white; box-shadow: 0 4px 12px rgba(122, 0, 25, 0.2); }

.logout-wrapper {
margin-top: auto;
padding-top: 20px;
border-top: 1px solid #f1f5f9;
}

.logout-item { color: #e11d48; margin-bottom: 10px; }
.logout-item:hover { background: #fff1f2; }

/* Main Workspace */
.main-workspace {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}

.workspace-header {
height: 72px;
background: white;
border-bottom: 1px solid #e2e8f0;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 32px;
flex-shrink: 0;
}

.title-text {
font-size: 1.2rem;
font-weight: 900;
color: #7a0019;
text-transform: uppercase;
letter-spacing: 1px;
}

.header-actions {
display: flex;
align-items: center;
gap: 24px;
}

.user-profile {
display: flex;
align-items: center;
gap: 12px;
padding-left: 20px;
border-left: 1px solid #f1f5f9;
}

.user-info {
display: flex;
flex-direction: column;
align-items: flex-end;
}

.user-name {
font-size: 0.85rem;
font-weight: 800;
color: #1e293b;
}

.user-role {
font-size: 0.7rem;
font-weight: 700;
color: #7a0019;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.user-avatar {
width: 40px;
height: 40px;
background: #7a0019;
color: white;
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-weight: 900;
font-size: 0.9rem;
box-shadow: 0 4px 10px rgba(122, 0, 25, 0.2);
}

.content-area {
flex: 1;
overflow-y: auto;
padding: 32px;
background: #f8fafc;
}

@media (max-width: 1024px) {
.user-info { display: none; }
.workspace-header { padding: 0 20px; }
}
</style>
